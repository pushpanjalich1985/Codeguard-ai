<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeGuard AI 🛡️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 22px; color: #58a6ff; }

    header span {
      font-size: 12px;
      color: #8b949e;
      background: #21262d;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #30363d;
    }

    .container {
      max-width: 860px;
      margin: 36px auto;
      padding: 0 20px;
    }

    .intro {
      text-align: center;
      margin-bottom: 32px;
    }

    .intro h2 { font-size: 26px; margin-bottom: 8px; }

    .intro p { color: #8b949e; font-size: 15px; }
    .input-section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 22px;
    }

    .top-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: center;
    }

    .top-bar label { font-size: 14px; color: #8b949e; }

    select {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 200px;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: vertical;
      outline: none;
    }

    textarea:focus { border-color: #58a6ff; }
    textarea::placeholder { color: #484f58; }

    button#analyzeBtn {
      margin-top: 14px;
      width: 100%;
      padding: 13px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button#analyzeBtn:hover { background: #2ea043; }

    button#analyzeBtn:disabled {
      background: #21262d;
      color: #8b949e;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 36px;
      color: #484f58;
      font-size: 15px;
    }

    .summary-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .summary-pill {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
    }

    .pill-red    { background: #3d1f1f; color: #f85149; border: 1px solid #f85149; }
    .pill-orange { background: #3d2b1f; color: #e3b341; border: 1px solid #e3b341; }
    .pill-blue   { background: #1f2d3d; color: #58a6ff; border: 1px solid #58a6ff; }
    .pill-green  { background: #1f3d2b; color: #3fb950; border: 1px solid #3fb950; }
    .pill-gray   { background: #21262d; color: #8b949e; border: 1px solid #30363d; }

    .issue-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 14px;
      border-left: 4px solid #30363d;
    }

    .issue-card.critical { border-left-color: #f85149; }
    .issue-card.high     { border-left-color: #e3b341; }
    .issue-card.medium   { border-left-color: #58a6ff; }
    .issue-card.low      { border-left-color: #3fb950; }

    .issue-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .badge {
      font-size: 11px;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 12px;
      text-transform: uppercase;
    }

    .badge-critical { background: #3d1f1f; color: #f85149; }
    .badge-high     { background: #3d2b1f; color: #e3b341; }
    .badge-medium   { background: #1f2d3d; color: #58a6ff; }
    .badge-low      { background: #1f3d2b; color: #3fb950; }

    .issue-title { font-size: 15px; font-weight: bold; }

    .issue-body p {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .code-comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 0;
    }

    @media (max-width: 600px) {
      .code-comparison { grid-template-columns: 1fr; }
    }

    .code-block {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      overflow-x: auto;
    }

    .code-label {
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .label-bad  { color: #f85149; }
    .label-good { color: #3fb950; }

    .steps-list {
      color: #8b949e;
      font-size: 13px;
      padding-left: 18px;
      line-height: 1.9;
      margin-bottom: 12px;
    }

    .copy-btn {
      background: #21262d;
      color: #58a6ff;
      border: 1px solid #30363d;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .copy-btn:hover { background: #30363d; }

    .no-issues {
      text-align: center;
      padding: 36px;
      background: #161b22;
      border: 1px solid #3fb950;
      border-radius: 12px;
      color: #3fb950;
      font-size: 17px;
    }

    .analyzing {
      text-align: center;
      padding: 36px;
      color: #58a6ff;
      font-size: 15px;
    }
  </style>
</head>
<body>

<header>
  <h1>🛡️ CodeGuard AI</h1>
  <span>FOSS Hack 2026</span>
</header>

<div class="container">
  <div class="intro">
    <h2>Analyze Your Code Instantly</h2>
    <p>Detects security issues, syntax errors, logic bugs,
       and bad practices — and teaches you how to fix them.</p>
 </div>

  <div class="input-section">
    <div class="top-bar">
      <label>Language:</label>
      <select id="language">
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
        <option value="general">General</option>
      </select>
    </div>
    <textarea id="codeInput"
      placeholder="Paste your code here..."></textarea>
    <button id="analyzeBtn">
      🔍 Analyze Code
    </button>
  </div>

  <div id="results">
    <div class="empty-state">
      👆 Paste your code above and click Analyze
    </div>
  </div>

</div>

</body>
</html>
