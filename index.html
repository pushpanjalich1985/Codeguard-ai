<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeGuard AI 🛡️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 22px; color: #58a6ff; }

    header span {
      font-size: 12px;
      color: #8b949e;
      background: #21262d;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #30363d;
    }

    .container {
      max-width: 860px;
      margin: 36px auto;
      padding: 0 20px;
    }

    .intro {
      text-align: center;
      margin-bottom: 32px;
    }

    .intro h2 { font-size: 26px; margin-bottom: 8px; }

    .intro p { color: #8b949e; font-size: 15px; }
  </style>
</head>
<body>

<header>
  <h1>🛡️ CodeGuard AI</h1>
  <span>FOSS Hack 2026</span>
</header>

<div class="container">
  <div class="intro">
    <h2>Analyze Your Code Instantly</h2>
    <p>Detects security issues, syntax errors, logic bugs,
       and bad practices — and teaches you how to fix them.</p>
  </div>
</div>

</body>
</html>
