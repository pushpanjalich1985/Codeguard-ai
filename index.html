<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeGuard AI 🛡️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 22px; color: #58a6ff; }

    header span {
      font-size: 12px;
      color: #8b949e;
      background: #21262d;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #30363d;
    }

    .container {
      max-width: 860px;
      margin: 36px auto;
      padding: 0 20px;
    }

    .intro {
      text-align: center;
      margin-bottom: 32px;
    }

    .intro h2 { font-size: 26px; margin-bottom: 8px; }

    .intro p { color: #8b949e; font-size: 15px; }
    .input-section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 22px;
    }

    .top-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: center;
    }

    .top-bar label { font-size: 14px; color: #8b949e; }

    select {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 200px;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: vertical;
      outline: none;
    }

    textarea:focus { border-color: #58a6ff; }
    textarea::placeholder { color: #484f58; }

    button#analyzeBtn {
      margin-top: 14px;
      width: 100%;
      padding: 13px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button#analyzeBtn:hover { background: #2ea043; }

    button#analyzeBtn:disabled {
      background: #21262d;
      color: #8b949e;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 36px;
      color: #484f58;
      font-size: 15px;
    }
  </style>
</head>
<body>

<header>
  <h1>🛡️ CodeGuard AI</h1>
  <span>FOSS Hack 2026</span>
</header>

<div class="container">
  <div class="intro">
    <h2>Analyze Your Code Instantly</h2>
    <p>Detects security issues, syntax errors, logic bugs,
       and bad practices — and teaches you how to fix them.</p>
 </div>

  <div class="input-section">
    <div class="top-bar">
      <label>Language:</label>
      <select id="language">
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
        <option value="general">General</option>
      </select>
    </div>
    <textarea id="codeInput"
      placeholder="Paste your code here..."></textarea>
    <button id="analyzeBtn">
      🔍 Analyze Code
    </button>
  </div>

  <div id="results">
    <div class="empty-state">
      👆 Paste your code above and click Analyze
    </div>
  </div>

</div>

</body>
</html>
